# =============================================================================
# PLAYBOOK: Consolidación de reportes en CSV
# Corre en localhost DESPUÉS de audit_root.yml
# Uso:
#   ansible-playbook playbooks/consolidate_report.yml -e "fecha=2025-01-15"
# =============================================================================
---
- name: "Consolidar reportes JSON en CSV"
  hosts: localhost
  gather_facts: true
  vars:
    fecha: "{{ ansible_date_time.date }}"
    reporte_dir: "{{ playbook_dir }}/../reports/{{ fecha }}"

  tasks:
    - name: "CONSOLIDAR | Buscar todos los reportes JSON del día"
      ansible.builtin.find:
        paths: "{{ reporte_dir }}/por_host"
        patterns: "*.json"
      register: reportes_json

    - name: "CONSOLIDAR | Leer contenido de cada reporte"
      ansible.builtin.slurp:
        src: "{{ item.path }}"
      loop: "{{ reportes_json.files }}"
      register: reportes_contenido

    - name: "CONSOLIDAR | Construir lista de datos para CSV"
      ansible.builtin.set_fact:
        csv_filas: >-
          {{
            csv_filas | default([]) + [{
              'servidor':         (item.content | b64decode | from_json).metadata.host,
              'ip':               (item.content | b64decode | from_json).metadata.ip,
              'so':               (item.content | b64decode | from_json).metadata.so,
              'ambiente':         (item.content | b64decode | from_json).metadata.ambiente,
              'division':         (item.content | b64decode | from_json).metadata.division,
              'nivel_riesgo':     (item.content | b64decode | from_json).metadata.nivel_riesgo_general,
              'uid0_hallazgo':    (item.content | b64decode | from_json).hallazgos.uid0.hallazgo,
              'uid0_usuarios':    (item.content | b64decode | from_json).hallazgos.uid0.usuarios_no_root_con_uid0 | join(';'),
              'sudoers_severidad':(item.content | b64decode | from_json).hallazgos.sudoers.severidad,
              'sudoers_criticos': (item.content | b64decode | from_json).hallazgos.sudoers.criticos | length,
              'servicios_root':   (item.content | b64decode | from_json).hallazgos.servicios_systemd.servicios_corriendo_como_root | length,
              'rc_local':         (item.content | b64decode | from_json).hallazgos.procesos_y_scripts.rc_local.estado,
              'ssh_root':         (item.content | b64decode | from_json).hallazgos.ssh_y_cuenta_root.permit_root_login,
              'password_root':    (item.content | b64decode | from_json).hallazgos.ssh_y_cuenta_root.password_root,
              'authorized_keys':  (item.content | b64decode | from_json).hallazgos.ssh_y_cuenta_root.authorized_keys_root,
              'timestamp':        (item.content | b64decode | from_json).metadata.timestamp_auditoria
            }]
          }}
      loop: "{{ reportes_contenido.results }}"

    - name: "CONSOLIDAR | Escribir encabezado CSV"
      ansible.builtin.copy:
        content: >-
          servidor,ip,so,ambiente,division,nivel_riesgo,uid0_hallazgo,uid0_usuarios,
          sudoers_severidad,sudoers_criticos,servicios_root,rc_local,
          ssh_root,password_root,authorized_keys,timestamp
        dest: "{{ reporte_dir }}/consolidado_{{ fecha }}.csv"
        mode: '0644'

    - name: "CONSOLIDAR | Agregar filas al CSV"
      ansible.builtin.lineinfile:
        path: "{{ reporte_dir }}/consolidado_{{ fecha }}.csv"
        line: >-
          {{ item.servidor }},{{ item.ip }},{{ item.so }},{{ item.ambiente }},
          {{ item.division }},{{ item.nivel_riesgo }},{{ item.uid0_hallazgo }},
          "{{ item.uid0_usuarios }}",{{ item.sudoers_severidad }},
          {{ item.sudoers_criticos }},{{ item.servicios_root }},{{ item.rc_local }},
          {{ item.ssh_root }},{{ item.password_root }},{{ item.authorized_keys }},
          {{ item.timestamp }}
        insertafter: EOF
      loop: "{{ csv_filas }}"

    - name: "CONSOLIDAR | Mostrar resumen final"
      ansible.builtin.debug:
        msg:
          - "============================================"
          - "RESUMEN DE AUDITORÍA — {{ fecha }}"
          - "--------------------------------------------"
          - "Total servidores auditados: {{ csv_filas | length }}"
          - "CRÍTICOS:    {{ csv_filas | selectattr('nivel_riesgo', 'equalto', 'CRITICO') | list | length }}"
          - "ALTOS:       {{ csv_filas | selectattr('nivel_riesgo', 'equalto', 'ALTO') | list | length }}"
          - "ADVERTENCIA: {{ csv_filas | selectattr('nivel_riesgo', 'equalto', 'ADVERTENCIA') | list | length }}"
          - "OK:          {{ csv_filas | selectattr('nivel_riesgo', 'equalto', 'OK') | list | length }}"
          - "--------------------------------------------"
          - "CSV generado en: {{ reporte_dir }}/consolidado_{{ fecha }}.csv"
          - "============================================"
