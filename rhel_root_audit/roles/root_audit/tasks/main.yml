# =============================================================================
# MAIN: Orquestador de checks de auditoría de root
# =============================================================================
---

- name: "AUDIT | Cargar variables de usuarios genéricos"
  ansible.builtin.include_vars:
    file: usuarios_genericos.yml

- name: "AUDIT | Registrar timestamp de inicio"
  ansible.builtin.set_fact:
    audit_timestamp: "{{ ansible_date_time.iso8601 }}"
    audit_fecha: "{{ ansible_date_time.date }}"

# -----------------------------------------------------------------------------
# Ejecutar todos los checks
# -----------------------------------------------------------------------------

- name: "AUDIT | Check 1 - Usuarios con UID 0"
  ansible.builtin.include_tasks: check_uid0.yml
  tags: [uid0, critico]

- name: "AUDIT | Check 2 - Configuración de sudoers"
  ansible.builtin.include_tasks: check_sudoers.yml
  tags: [sudoers, critico]

- name: "AUDIT | Check 3 - Servicios systemd como root"
  ansible.builtin.include_tasks: check_services.yml
  tags: [services, alto]

- name: "AUDIT | Check 4 - Procesos y scripts heredados"
  ansible.builtin.include_tasks: check_processes.yml
  tags: [processes, alto]

- name: "AUDIT | Check 5 - Acceso SSH y estado cuenta root"
  ansible.builtin.include_tasks: check_ssh.yml
  tags: [ssh, advertencia]

# -----------------------------------------------------------------------------
# Calcular nivel de riesgo consolidado del host
# -----------------------------------------------------------------------------

- name: "AUDIT | Calcular nivel de riesgo general del host"
  ansible.builtin.set_fact:
    nivel_riesgo_general: >-
      {{
        'CRITICO' if (
          audit_uid0.hallazgo or
          audit_sudoers.severidad == 'CRITICO'
        )
        else 'ALTO' if (
          audit_services.hallazgo or
          audit_processes.hallazgo
        )
        else 'ADVERTENCIA' if (
          audit_ssh.hallazgo or
          audit_sudoers.severidad == 'ADVERTENCIA' or
          audit_processes.severidad == 'ADVERTENCIA'
        )
        else 'OK'
      }}

# -----------------------------------------------------------------------------
# Generar reporte JSON por host
# -----------------------------------------------------------------------------

- name: "AUDIT | Asegurar directorio de reportes en nodo de control"
  ansible.builtin.file:
    path: "{{ playbook_dir }}/../reports/{{ audit_fecha }}/por_host"
    state: directory
    mode: '0755'
  delegate_to: localhost
  run_once: false

- name: "AUDIT | Generar reporte JSON por host"
  ansible.builtin.template:
    src: report_host.json.j2
    dest: "{{ playbook_dir }}/../reports/{{ audit_fecha }}/por_host/{{ inventory_hostname }}.json"
    mode: '0644'
  delegate_to: localhost

- name: "AUDIT | Mostrar resumen en consola"
  ansible.builtin.debug:
    msg: >-
      {{
        ['======================================================',
         'HOST: ' + inventory_hostname,
         'NIVEL DE RIESGO: ' + nivel_riesgo_general,
         '======================================================',
         '[1] USUARIOS CON UID 0 | Severidad: ' + audit_uid0.severidad,
         '  Todos con UID 0: ' + (audit_uid0.usuarios_uid0 | join(', '))]
        + (audit_uid0.detalle
           | map('regex_replace', '[|][^|]*[|][^|]*$', '')
           | map('regex_replace', '[|]', '  pw: ')
           | map('regex_replace', '^', '  >> [ALERTA] ')
           | list
           if audit_uid0.hallazgo | bool else ['  >> Sin usuarios no-root con UID 0'])
        + ['------------------------------------------------------',
           '[2] SUDOERS | Severidad: ' + audit_sudoers.severidad
           + ' | Criticos: ' + (audit_sudoers.hallazgos_criticos | length | string)
           + ' | Advertencias: ' + (audit_sudoers.hallazgos_advertencia | length | string)]
        + (audit_sudoers.hallazgos_criticos
           | map('regex_replace', '^[^|]+[|][^|]+[|]', '  >> [CRITICO]     ')
           | list
           if audit_sudoers.hallazgos_criticos | length > 0 else ['  >> Sin hallazgos'])
        + (audit_sudoers.hallazgos_advertencia
           | map('regex_replace', '^[^|]+[|][^|]+[|]', '  >> [ADVERTENCIA] ')
           | list
           if audit_sudoers.hallazgos_advertencia | length > 0 else [])
        + ['------------------------------------------------------',
           '[3] SERVICIOS CORRIENDO COMO ROOT | Severidad: ' + audit_services.severidad
           + ' | Cantidad: ' + (audit_services.servicios_corriendo_como_root | length | string)]
        + (audit_services.servicios_corriendo_como_root
           | map('regex_replace', '[|].*$', '')
           | map('regex_replace', '^', '  >> ')
           | list
           if audit_services.servicios_corriendo_como_root | length > 0 else ['  >> Sin hallazgos'])
        + ['------------------------------------------------------',
           '[4] PROCESOS COMO ROOT | Severidad: ' + audit_processes.severidad,
           '  rc.local: ' + audit_processes.rc_local_estado]
        + (audit_processes.procesos_root_sin_systemd
           | map('regex_replace', '[|][^|]*$', '')
           | map('regex_replace', '[|]', ' ')
           | map('regex_replace', '^', '  >> PID: ')
           | list
           if audit_processes.procesos_root_sin_systemd | length > 0 else ['  >> Sin procesos huerfanos'])
        + ['  cron root:']
        + (audit_processes.cron_root
           | reject('equalto', 'SIN_CRONTAB_ROOT')
           | reject('equalto', '---CRON.D---')
           | map('regex_replace', '^', '  >> ')
           | list
           if (audit_processes.cron_root | reject('equalto', 'SIN_CRONTAB_ROOT') | list | length > 0)
           else ['  >> Sin entradas de cron para root'])
        + ['------------------------------------------------------',
           '[5] SSH / CUENTA ROOT | Severidad: ' + audit_ssh.severidad,
           '  >> PermitRootLogin : ' + audit_ssh.permit_root_login,
           '  >> Password root   : ' + audit_ssh.password_root_estado,
           '  >> Authorized keys : ' + audit_ssh.authorized_keys,
           '======================================================']
      }}
